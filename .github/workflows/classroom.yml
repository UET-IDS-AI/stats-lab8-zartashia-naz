name: Autograding Tests
'on':
- workflow_dispatch
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Q1
      id: q1
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Q1
        setup-command: pip install numpy pytest
        command: pytest test_AIstats_lab.py::test_joint_cdf_unit_square_inside test_AIstats_lab.py::test_joint_cdf_unit_square_outside
          test_AIstats_lab.py::test_rectangle_probability test_AIstats_lab.py::test_marginals_unit_square
        timeout: 10
        max-score: 5
    - name: Q2
      id: q2
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Q2
        setup-command: pip install numpy pytest
        command: pytest test_AIstats_lab.py::test_joint_pmf_heads test_AIstats_lab.py::test_marginal_px_heads
          test_AIstats_lab.py::test_marginal_py_heads test_AIstats_lab.py::test_check_independence_heads
        timeout: 10
        max-score: 5
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        Q1_RESULTS: "${{steps.q1.outputs.result}}"
        Q2_RESULTS: "${{steps.q2.outputs.result}}"
      with:
        runners: q1,q2
